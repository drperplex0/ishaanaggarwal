<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Ishaan Aggarwal — Document</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body>
<div class="wrap">

    <div class="site-head">
        <span class="site-name"><a href="index.html">Ishaan Aggarwal</a></span>
        <nav>
            <a href="about.html">About</a>
            <a href="work.html">Projects</a>
            <a href="writings.html">Writing</a>
            <a href="readwise.html">Reading</a>
        </nav>
    </div>

    <a id="back-link" href="work.html" class="back">&larr; Back</a>

    <div class="page-title">
        <h1 id="pdf-title">Loading...</h1>
        <p class="subtitle" id="pdf-description"></p>
    </div>

    <div class="pdf-wrap">
        <div class="pdf-controls">
            <button class="pdf-btn" id="prev-page">&#8592; Prev</button>
            <button class="pdf-btn" id="next-page">Next &#8594;</button>
            <span class="page-count">Page <span id="page-num">1</span> / <span id="page-count">—</span></span>
            <button class="pdf-btn" id="download-pdf">Download</button>
        </div>
        <div class="pdf-canvas-wrap">
            <canvas id="pdf-render"></canvas>
        </div>
    </div>

</div>

    <script>

        // PDF.js viewer implementation
        const url = new URL(window.location.href);
        const pdfParam = url.searchParams.get('pdf') || 'NRC_Technical_Report.pdf';
        // Prepend pdfs/ folder prefix (links pass bare filename as ?pdf= param)
        const pdfPath = pdfParam.startsWith('pdfs/') ? pdfParam : 'pdfs/' + pdfParam;
        const pdfTitle = url.searchParams.get('title') || 'Technical Document';
        const pdfDescription = url.searchParams.get('desc') || 'View the document online';

        // Map PDFs to their corresponding images and headings from work.html
        const pdfImageMap = {
            'reactor_vessel.pdf': {
                image: 'images/WardZero front.jpg',
                heading: 'Nuclear Reactor Pressure Vessel'
            },
            'reactor_core.pdf': {
                image: 'images/core barrel sheel.jpg',
                heading: 'Nuclear Reactor Core'
            },
            'Optical_Pumping_Lab_Report.pdf': {
                image: 'images/laser lab img.jpg',
                heading: 'Optical Pumping Research'
            },
            'Skin_Depth_Lab_Report.pdf': {
                image: 'images/oscilloscope img.jpg',
                heading: 'Electromagnetic Skin Depth Analysis'
            },
            'TCI_Report.pdf': {
                image: 'images/TCI img.jpg',
                heading: 'Topological Crystalline Insulators'
            },
            'X_Ray_Diffraction.pdf': {
                image: 'images/xray_diffraction_machine.jpg',
                heading: 'X-Ray Diffraction Analysis'
            },
            'NRC_Technical_Report.pdf': {
                image: 'images/NRC_lab_img.jpg',
                heading: 'Materials Science Research'
            }
        };

        document.getElementById('pdf-title').textContent = pdfTitle;
        document.getElementById('pdf-description').textContent = pdfDescription;
        document.getElementById('page-title').textContent = 'Ishaan Aggarwal — ' + pdfTitle;
        
        // The workerSrc property needs to be specified
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // Asynchronous download PDF
        let pdfDoc = null,
            pageNum = 1,
            pageRendering = false,
            pageNumPending = null,
            scale = 1.5,
            canvas = document.getElementById('pdf-render'),
            ctx = canvas.getContext('2d');
            
        // Adjust scale based on screen size
        function adjustScale() {
            const viewportWidth = window.innerWidth;
            if (viewportWidth < 768) {
                scale = 1.0;  // Smaller scale for mobile
            } else if (viewportWidth < 1200) {
                scale = 1.3;  // Medium scale for tablets
            } else {
                scale = 1.5;  // Full scale for desktops
            }
            
            // Re-render the current page with the new scale if we already have a document
            if (pdfDoc) {
                queueRenderPage(pageNum);
            }
        }
        
        // Set initial scale
        adjustScale();

        /**
         * Get page info from document, resize canvas accordingly, and render page.
         * @param num Page number.
         */
        function renderPage(num) {
            pageRendering = true;
            
            // Using promise to fetch the page
            pdfDoc.getPage(num).then(function(page) {
                const viewport = page.getViewport({scale: scale});
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                
                // Render PDF page into canvas context
                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };
                
                const renderTask = page.render(renderContext);
                
                // Wait for rendering to finish
                renderTask.promise.then(function() {
                    pageRendering = false;
                    if (pageNumPending !== null) {
                        // New page rendering is pending
                        renderPage(pageNumPending);
                        pageNumPending = null;
                    }
                });
            });
            
            // Update page counters
            document.getElementById('page-num').textContent = num;
        }

        /**
         * If another page rendering in progress, waits until the rendering is
         * finished. Otherwise, executes rendering immediately.
         */
        function queueRenderPage(num) {
            if (pageRendering) {
                pageNumPending = num;
            } else {
                renderPage(num);
            }
        }

        /**
         * Displays previous page.
         */
        function onPrevPage() {
            if (pageNum <= 1) {
                return;
            }
            pageNum--;
            queueRenderPage(pageNum);
        }

        /**
         * Displays next page.
         */
        function onNextPage() {
            if (pageNum >= pdfDoc.numPages) {
                return;
            }
            pageNum++;
            queueRenderPage(pageNum);
        }

        /**
         * Download current PDF
         */
        function downloadPDF() {
            const link = document.createElement('a');
            link.href = pdfPath;
            link.download = pdfPath.split('/').pop();
            link.click();
        }

        /**
         * Asynchronously downloads PDF.
         */
        pdfjsLib.getDocument(pdfPath).promise.then(function(pdfDoc_) {
            pdfDoc = pdfDoc_;
            document.getElementById('page-count').textContent = pdfDoc.numPages;
            
            // Initial/first page rendering
            renderPage(pageNum);
        });

        // Button events
        document.getElementById('prev-page').addEventListener('click', onPrevPage);
        document.getElementById('next-page').addEventListener('click', onNextPage);
        document.getElementById('download-pdf').addEventListener('click', downloadPDF);

        // Handle window resize
        window.addEventListener('resize', function() {
            adjustScale();
        });
    </script>
</body>
</html>
